<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        body{
            /* height: 5000px; */
        }
        .wrap{
            width: 100%;
            overflow: hidden;
        }
        .main_header{
            width: 100%;
            height: 100px;
            background-color: red;
            position: fixed;
            top: 0;
            left: 0;
        }
        .page{
            width: 100%;
            height: 100vh;
            font-size: 100px;
            text-align: center;
            background-color: lightblue;
            border-bottom: 10px solid black;
            padding-top: 150px;
        }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
        $(document).ready(function(){
            // 1. 스크롤의 초기값
            // => 브라우저를 처음 로드할 때의 스크롤의 위치값
            let sct_now=0;
            $(window).scroll(function(){
                let sct_after=$(this).scrollTop();
                // => 스크롤을 할 때마다 새로운 스크롤의 위치값이 저장
                if(sct_now<sct_after){
                    console.log('스크롤을 아래로 내림');
                    // 스크롤을 내릴 때 실행되는 영역
                    $('.main_header').animate({
                        top:-100
                    })                    
                    sct_now=sct_after;
                    // => sct_now에 sct_after의 값을 대입(업데이트) 시킨다는 의미
                }else if(sct_now>sct_after){
                    console.log('스크롤을 위로 올림');
                    // 스크롤을 올릴 때 실행되는 영역
                    $('.main_header').animate({
                        top:0
                    })
                    sct_now=sct_after;
                }
                // console.log('sct_now :',sct_now)
                // console.log('sct_after :',sct_after)
            })
        })
    </script>
</head>
<body>
    <div class="wrap">
        <header class="main_header">메뉴영역</header>
        <div class="page">1</div>
        <div class="page">2</div>
    </div>
</body>
</html>
