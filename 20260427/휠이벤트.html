<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 500px;
            height: 400px;
            border: 10px solid black;
            font-size: 50px;
        }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!-- => 항상 먼저 로드되어야 하는 제이쿼리 기본 플러그인 -->
    <script src="./jquery.mousewheel.min.js"></script>
    <!-- => 다운 받은 추가 플러그인은 외부파일로 연결 -->
    <script>
        $(document).ready(function(){
            // 마우스 휠 플러그인 활용법
            // $(선택자).mousewheel(function(event,delta){
            //     마우스 휠의 방향 위로 올렸을 때
            //     => delta>0
            //     마우스 휠의 방향이 아래로 내렸을 때
            //     => delta<0
            // })
            // $('.box').mousewheel(function(event,delta){
            //     if(delta>0){
            //         console.log('올림');
            //     }else if(delta<0){
            //         console.log('내림');
            //     }
            // })
            $('.box').mousewheel(function(event,delta){
                if(delta>0){
                    // console.log('올림');
                    // 선택한 객체에 텍스트요소 삽입 명령
                    // $(선택자).text('삽입할 텍스트 내용')
                    $(this).text('올림').css({
                        backgroundColor:"red"
                    })
                }else if(delta<0){
                    // console.log('내림');
                    $(this).text('내림').css({
                        backgroundColor:"blue"
                    })
                }
            })


        })
    </script>
</head>
<body>
    <div class="box"></div>
</body>
</html>
