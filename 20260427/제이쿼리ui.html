<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            width: 500px;
            height: 400px;
            border: 10px solid black;
            /* transition-duration: 0.5s; */
        }
        .bg{
            background-color: blue;
        }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="./jquery-ui.min.js"></script>
    <!-- => 플러그인 연결 시 주의사항
    => 첫번째 가장 기본 플러그인 연결
    => 두번째 제이쿼리 ui 플러그인 연결
    => 세번째 플러그인부터 기능의 지정 영역이 클수록 위로 작을수록 밑으로 연결 -->
    <script>
        $(document).ready(function(){
            // .box를 클릭해서 배경색 지정 시간값 0.5s
            $('.box').click(function(){
                // 1. css 활용하기
                // => css 트렌지션으로 시간값 적용
                // $(this).css({
                //     backgroundColor:'red',
                //     transitionDuration:'0.5s'
                // })

                // 2. 클래스 활용
                // $(this).addClass('bg',2000,function(){
                //     $(this).css({
                //         width:200
                //     })
                // });
                // => addClass 사용 시 시트에 삽입된 클래스 명으로 스타일 지정이 필요
                // => 제이쿼리 ui플러그인 추가 시 addClass에 시간값 적용 가능
                // $(this).removeClass('bg',500);
                // $(this).toggleClass('bg',500);
                // => 만약 클래스명이 있으면 removeClass
                // => 클래스명이 없으면 addClass
                // => animate의 보완으로 동적 움직임 지정 시 활용 가능
            })
        })
    </script>
</head>
<body>
    <div class="box bg"></div>
</body>
</html>
