<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .mask_box{
            width: 800px;
            height: 400px;
            border: 10px solid black;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }
        .move_box{
            /* 400*5+50*5=2250 */
            width: 2250px;
            height: 400px;
            position: absolute;
            top: 0;
            left: -300px;
            display: flex;
        }
        .img_box{
            width: 400px;
            height: 400px;
            background-color: teal;
            font-size: 100px;
            text-align: center;
            margin-left: 50px;
            transform: scale(0.7);
            transition-duration: 0.5s;
        }
        .size_on{
            transform: scale(1.0);
        }
        .but{
            width: 100px;
            height: 100px;
            font-size: 50px;
            position: absolute;
            top: calc(50% - 50px);
        }
        .left_but{
            left: 10px;
        }
        .right_but{
            right: 10px;
        }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
        $(document).ready(function(){
            $('.right_but').click(function(){
                $('.img_box').removeClass('size_on');
                // 이미 삽입된 size_on 클래스 제거
                $('.img_box').eq(2).addClass('size_on');
                // 첫번째 객체를 선택해서 뒤로 보내는 작업 전 순서값

                $('.move_box').animate({
                    left:-750
                },800,function(){
                    $('.img_box').first().appendTo('.move_box');
                    $('.move_box').css({
                        left:-300
                    })
                })
            })

            $('.left_but').click(function(){
                $('.img_box').last().prependTo('.move_box');
                
                $('.img_box').removeClass('size_on');
                $('.img_box').eq(1).addClass('size_on');
                
                $('.move_box').css({
                    left:-750
                }).animate({
                    left:-300
                },800)

            })
        })
    </script>
</head>
<body>
    <div class="mask_box">
        <div class="move_box">
            <div class="img_box">1</div>
            <div class="img_box size_on">2</div>
            <div class="img_box">3</div>
            <div class="img_box">4</div>
            <div class="img_box">5</div>
        </div>
        <button class="but left_but">&lt;</button>
        <button class="but right_but">&gt;</button>
    </div>
</body>
</html>
