<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <a href="https:www.naver.com">네이버</a>
    <div id="box">클릭</div>
    <script>
        // 이벤트 연결하기
        // 선택자.addEventListener('이벤트명',function(){
        //     이벤트가 발생되면 실행되는 문장
        // })

        // 선택자.addEventListener('이벤트명',()=>{
        //     이벤트가 발생되면 실행되는 문장
        // })
        // 이벤트명
        // 마우스 이벤트
        // click : 마우스의 왼쪽 버튼을 눌렀다 뗐을 때
        // dbclick : 마우스의 왼쪽 버튼을 일정시간 안에 연속적으로 눌렀다 뗐을 때
        // mouseenter : 마우스가 영역 안쪽으로 들어갔을 때
        // mouseleave : 마우스가 영역 밖으로 나올때
        // mousemove : 마우스가 움직일 때
        // mousedown : 마우스를 눌렀을 때
        // mouseup : 마우스를 뗐을 때
        // => 이벤트 명은 전부 소문자

        // 박스를 클릭하면 배경색 변경하기
        // const box=document.querySelector('#box');
        // box.addEventListener('click',function(){
        //     box.style.backgroundColor="red"
        // })

        // 문제
        // 1. 첫번째 box를 클릭하면 배경색이 빨강으로 변경되고
        // 2. 두번째 box를 클릭하면 배경색이 다시 흰색으로 변경이 되게 만들기

        // click_num이라는 변수에 첫번째 클릭이라는 값이 있으면 box에 배경색을 빨강
        // click_num이라는 변수에 두번째 클릭이라는 값이 있으면 box에 배경색을 흰색

        const box=document.querySelector('#box');
        let click_num="첫번째 클릭";
        box.addEventListener('click',()=>{
            if(click_num=="첫번째 클릭"){
                box.style.backgroundColor="red"
                click_num=="두번째 클릭";
            }else if(click_num=="두번째 클릭"){
                box.style.backgroundColor="fff"
                click_num=="첫번째 클릭"
            }
            
        })

    </script>
</body>
</html>
