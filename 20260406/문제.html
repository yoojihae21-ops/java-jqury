<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        for(dan=2;dan<=9;dan++){
            // =>단에 해당 큰for
            document.write(`${dan}단 입니다<br>`)
            for(gob=1;gob<=9;gob++){
                // =>곱해지는 수에 해당하는 작은 for
                document.write(`${dan}x${gob}=${dan*gob}<br>`)
            }
            document.write(`<br><br>`)
        }
    </script>
</body>
</html>
