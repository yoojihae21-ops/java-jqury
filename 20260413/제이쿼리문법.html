<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- 외부 스크립트 연결 -->
    <!-- <script src="./jquery-4.0.0.min.js"></script>
    => 내 컴퓨터에 저장된 제이쿼리 불러오기(네트워크 없어도 사용 가능) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js">
        // scr로 연결된 script파일 내부에는 아무것도 삽입할 수 없음
    </script>
    <script>
        // $(선택자)
        // $(document).ready(function(){
            // 제이쿼리 내용을 작성함
        // })
        // ㄴ순서대로 읽어서 진행해줘라는 뜻

        // =>축약형
        // $(function(){
            // 제이쿼리 내용을 작성함
        // })

        // document.addEventListener('DOMContentLoad',()=>{})
        // =>자바스크립트에서 문서 로드 이벤트

        $(document).ready(function(){
            // $('css선택자')
            // =>태그 선택 $('태그명')
            // =>클래스 선택 $('.클래스명')
            // =>아이디 선택 $('#아이디명')
            // $(document), $(window), $(this) => ''없음
            // ㄴ내가 만든게 아닌 선택자는 따옴표 넣으면 안됨

            // $(선택자).css관련 명령({속성값이 여러개 들어간다면 중괄호
            //     width:400,
            //     height:400,
            //     border:'10px solid black',
            //     fontSize:"30px",
            //     textAlign:'center'
            // })

            $('.box').css({
                width:400,
                height:400,
                border:'10px solid black',
                fontSize:"30px",
                textAlign:'center'
            })
            // $(선택자).css('속성명','속성값')
            // $(선택자).css('속성명',function(){})
            // => 1개일때

            $(선택자).css({
                속성명:'속성값',
                속성명:'속성값',
                속성명:function(){}
            })
            => 여러개일때
        })
    </script>
</head>
<body>
    <div class="box">
        텍스트
    </div><!-- box -->
</body>
</html>
