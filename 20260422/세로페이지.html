<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .mask_box{
            width: 100%;
            height: 100vh;
            /* border: 10px solid black; */
            position: relative;
            overflow: hidden;
        }
        .move_box{
            width: 100%;
            height: calc(100% * 5);
            position: absolute;
            top: 0;
            left: 0;
        }
        .img_box{
            width: 100%;
            height: calc(100% / 5);
            font-size: 100px;
            background-color: lightcoral;
            text-align: center;
        }
        .but_wrap{
            width: 50px;
            height: 300px;
            /* background-color: lightgreen; */
            position: absolute;
            top: calc(50% - 150px);
            left: 10px;
            display: flex;
            flex-wrap: wrap;
            align-content: space-between;
        }
        .but{
            width: 50px;
            height: 50px;
            background-color: lightblue;
            font-size: 20px;
            text-align: center;
            line-height: 50px;
            border-radius: 50%;
        }
        .but.on{
            background-color: purple;
        }
    </style>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
        $(document).ready(function(){
            // 각 버튼을 클릭하면 각 이미지가 보이게 이벤트 작성
            // 왼쪽으로 move_box가 움직임
            // $('.but_1').click(function(){
            //     $('.move_box').animate({
            //         left:0
            //     })
            // })
            // $('.but_2').click(function(){
            //     $('.move_box').animate({
            //         left:-800
            //     })
            // })
            // $('.but_3').click(function(){
            //     $('.move_box').animate({
            //         left:-1600
            //     })
            // })
            // $('.but_4').click(function(){
            //     $('.move_box').animate({
            //         left:-2400
            //     })
            // })
            // $('.but_5').click(function(){
            //     $('.move_box').animate({
            //         left:-3200
            //     })
            // })
            $('.but').click(function(){
                let i=$(this).index()
                $('.move_box').animate({
                    /* left:-800*i */
                    top:`-${i*100}vh`
                })
                $('.but').removeClass('on');
                $(this).addClass('on');
                // 전체 삭제하고 선택한 아이에게만 on 클래스를 적용시켜줘
            })

            // 버튼에 활성화 표시
            // => 클래스 활용하기
            // 클래스 추가 addClass(클래스명)
            // 클래스 제거 removeClass(클래스명)

        })
    </script>
</head>
<body>
    <div class="mask_box">
        <div class="move_box">
            <div class="img_box">1</div>
            <div class="img_box">2</div>
            <div class="img_box">3</div>
            <div class="img_box">4</div>
            <div class="img_box">5</div>
        </div>
        <div class="but_wrap">
            <div class="but but_1 on">1</div>
            <div class="but but_2">2</div>
            <div class="but but_3">3</div>
            <div class="but but_4">4</div>
            <div class="but but_5">5</div>
        </div>
    </div>
</body>
</html>
